<section class="page-container">
    <div class="login-card">
        <h1>Login</h1>

        <form class="login-form" (ngSubmit)="onSubmit()">
            <input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="Email"
            />

            <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Password"
            />

            <button type="submit">Login</button>

        </form>
    </div>
</section>
