<section class="page-container">
  <div class="category-wrapper">
    <h1>Categories</h1>

    <div class="category-grid">
      <div class="category-card" *ngFor="let category of categories" [routerLink]="['/category', category.slug]">
        <h2>{{ category.name}}</h2>
        <p>{{ category.description}}</p>
      </div>
    </div>
  </div>
</section>
